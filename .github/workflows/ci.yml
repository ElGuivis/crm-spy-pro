name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun x tsc --noEmit

      - name: Build
        run: bun run build

  env-secrets-check:
    name: Env Secrets Gate
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Block private secrets in .env
        run: deno run --allow-read scripts/check-env-secrets.ts

  file-size-check:
    name: File Size Gate
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Check file sizes (blocks on critical violations)
        run: deno run --allow-read --allow-env scripts/check-file-sizes.ts

  schema-drift:
    name: Schema Drift Check
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Check schema drift
        run: deno run --allow-read scripts/check-schema-drift.ts

  function-contract-audit:
    name: Function Contract Audit
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Audit function contracts
        run: deno run --allow-read scripts/audit-function-contracts.ts

  edge-function-tests:
    name: Edge Function Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Auth Guard Tests (AUTHENTICATED functions)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: deno test supabase/functions/tests/auth-guard.test.ts --allow-net --allow-env --allow-read

      - name: Internal Auth Tests (INTERNAL functions)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: deno test supabase/functions/tests/internal-auth.test.ts --allow-net --allow-env --allow-read

      - name: Webhook Tests (PUBLIC functions)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: deno test supabase/functions/tests/webhooks.test.ts --allow-net --allow-env --allow-read

      - name: CORS Guard Tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: deno test supabase/functions/tests/cors-guard.test.ts --allow-net --allow-env --allow-read

      - name: Invite Flow Tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: deno test supabase/functions/tests/invite-flow.test.ts --allow-net --allow-env --allow-read

      - name: Contract Regression Tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: deno test supabase/functions/tests/contract-regression.test.ts --allow-net --allow-env --allow-read

      - name: Extended Contract Tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: deno test supabase/functions/tests/extended-contracts.test.ts --allow-net --allow-env --allow-read

      - name: Critical Flow Tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: deno test supabase/functions/tests/critical-flows.test.ts --allow-net --allow-env --allow-read

      - name: Happy Path Flow Tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: deno test supabase/functions/tests/happy-path-flows.test.ts --allow-net --allow-env --allow-read
